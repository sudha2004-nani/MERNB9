<!DOCTYPE html>
<html>
    <head>
        <title>simple website</title>
        <link rel="stylesheet" href="studentlogin.html">

        <style>
            .Nav{
                background-color: rgb(200, 203, 15);
                padding: 1px;
                margin: 20px;
                border: 2px solid rgb(16, 235, 122);
                text-align: center;
            }
            .header{
                background-color: aquamarine;
                padding: 20px;
                text-align: center;
            }
            /* login box*/
            .login-box{
                width: 300px;
                margin: 30px auto;
                padding: 20px;
                border: 2px solid rgb(16, 235, 122);
                text-align: center;
            }
            .login-box input{
                width: 90%;
                padding: 8px;
                margin: 8px 0;
            }
            .login-box button{
                padding: 8px 15px;
                background-color: rgb(4, 4, 253);
                color: rgb(145, 150, 152);
                border: none;
                cursor: pointer;
            }
            .login-box button:hover{
                background-color: rgba(53, 16, 164, 0.847);
            }
        </style>
    </head>
    <body>
        <!--Header-->
        <div class="header">
            <h1>Annamacharya university</h1>
            </div>
            <!--Nav-->
            <div class="Nav">
                <a href="https://annamacharyauniversity.edu.in/">website</a><br>
                <a href="studentlogin.html">About</a><br>
                <a href="https://www.youtube.com/?gl=IN" target="_blank">YouTube</a>
            </div>
            <div class="content">
                <h2>Welcome to my website</h2>
                <p>this is a simple website layout created using html</p>
                <div class="login-box">
                    <h3>student login</h3>
                <form>
                <label>Registration form</label><br>
                <input type="text" placeholder="Enter rigistration number">
                <label>Password</label><br>
                <input type="password" placeholder="Enter password">
                <button type="submit">Login</button>
            </form>
            </div>
            </div>
            <!--footer-->
            <div class="footer">
                <p>@ 2026 my website</p>
            </div>
    </body>
</html>
